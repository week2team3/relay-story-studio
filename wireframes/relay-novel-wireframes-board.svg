  <rect x="2012" y="1004" width="82" height="32" rx="16" fill="#111827"/>
  <text x="2035" y="1025" fill="#FFFFFF" font-size="13" font-family="Helvetica, Arial, sans-serif">Back</text>

  <rect x="1498" y="1072" width="504" height="292" rx="20" fill="#FFFCF5" stroke="#E4E7EC"/>
  <text x="1540" y="1114" fill="#344054" font-size="14" font-family="Georgia, Times New Roman, serif">The corridor had already forgotten the footsteps</text>
  <text x="1540" y="1142" fill="#344054" font-size="14" font-family="Georgia, Times New Roman, serif">that made it important. Dust rested on the window frame,</text>
  <text x="1540" y="1170" fill="#344054" font-size="14" font-family="Georgia, Times New Roman, serif">and the moonlight stretched over the floorboards like a</text>
  <text x="1540" y="1198" fill="#344054" font-size="14" font-family="Georgia, Times New Roman, serif">sheet someone had forgotten to fold. Yerin pressed her</text>
  <text x="1540" y="1226" fill="#344054" font-size="14" font-family="Georgia, Times New Roman, serif">hand against the door and felt the grain of old wood,</text>
  <text x="1540" y="1254" fill="#344054" font-size="14" font-family="Georgia, Times New Roman, serif">thinking not about who had left, but who might still be</text>
  <text x="1540" y="1282" fill="#344054" font-size="14" font-family="Georgia, Times New Roman, serif">waiting on the other side. When the latch gave way, the</text>
  <text x="1540" y="1310" fill="#344054" font-size="14" font-family="Georgia, Times New Roman, serif">silence opened before her like the first sentence of a</text>
  <text x="1540" y="1338" fill="#344054" font-size="14" font-family="Georgia, Times New Roman, serif">story that had been looking for a reader.</text>
  <rect x="1410" y="1102" width="54" height="110" rx="12" fill="#F2F4F7" stroke="#D0D5DD"/>
  <rect x="1410" y="1230" width="54" height="110" rx="12" fill="#F2F4F7" stroke="#D0D5DD"/>
  <text x="1398" y="1386" fill="#667085" font-size="12" font-family="Helvetica, Arial, sans-serif">Node metadata is removed. Only stitched body text and images remain.</text>

  <rect x="1984" y="274" width="128" height="66" rx="16" fill="#FFFFFF" stroke="#D0D5DD"/>
  <text x="2008" y="304" fill="#111827" font-size="12" font-family="Helvetica, Arial, sans-serif" font-weight="700">Node style</text>
  <text x="2004" y="324" fill="#667085" font-size="11" font-family="Helvetica, Arial, sans-serif">Fixed card size</text>

  <rect x="1930" y="588" width="182" height="74" rx="18" fill="#FFF7ED" stroke="#FDB022"/>
  <text x="1952" y="618" fill="#B54708" font-size="13" font-family="Helvetica, Arial, sans-serif" font-weight="700">Interaction Notes</text>
  <text x="1952" y="640" fill="#B54708" font-size="11" font-family="Helvetica, Arial, sans-serif">- View by link</text>
  <text x="1952" y="656" fill="#B54708" font-size="11" font-family="Helvetica, Arial, sans-serif">- Login to write</text>

  <rect x="80" y="1380" width="2040" height="72" rx="18" fill="#FFFFFF" stroke="#D0D5DD"/>
  <text x="108" y="1412" fill="#111827" font-size="14" font-family="Helvetica, Arial, sans-serif" font-weight="700">Implementation notes</text>
  <text x="270" y="1412" fill="#475467" font-size="13" font-family="Helvetica, Arial, sans-serif">React Flow canvas, draggable node positions, MongoDB tree data, Auth.js login, summary hidden by default, branch auto-ending rendered like normal ending.</text>
  <text x="108" y="1434" fill="#475467" font-size="13" font-family="Helvetica, Arial, sans-serif">This SVG can be imported into Figma as a base board and split into frames if you want a cleaner product-design pass.</text>
</svg>
